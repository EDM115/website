  - '@takumi-rs/core-win32-x64-msvc@1.8.5'
  - '@takumi-rs/core@1.8.5'
  - '@takumi-rs/helpers@1.8.5'
  - '@vue/language-core@3.3.5'
  - vue-tsc@3.3.5

